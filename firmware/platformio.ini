; ESP32-S3 (N32R16V class: 32MB octal flash, 16MB octal PSRAM, native USB-Serial/JTAG)
[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Memory: this module uses OCTAL (OPI) flash and PSRAM ---
board_build.flash_mode = qio
board_upload.flash_size = 32MB
board_build.arduino.memory_type = qio_opi   ; QIO flash + OPI PSRAM

monitor_speed = 115200
upload_speed = 921600

build_flags =
  -I include
  ; Route Serial over the native USB-Serial/JTAG so prints work over USB:
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D BOARD_HAS_PSRAM

lib_deps =
  arduino-libraries/Stepper@^1.1.3
  adafruit/Adafruit SSD1306@^2.5.13
  adafruit/Adafruit GFX Library@^1.11.11
